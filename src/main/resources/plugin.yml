name: PinnacleStats
version: ${version}
main: org.pinnaclesmp.pinnaclestats.PinnacleStatsPlugin
api-version: '26.2'
author: Pinnacle SMP
description: Exposes formatted Minecraft player statistics for Pinnacle SMP member profiles.
commands:
  pstats:
    description: Manage PinnacleStats exports and API cache.
    usage: /pstats <status|reload|refresh|debug>
    permission: pinnaclestats.admin
permissions:
  pinnaclestats.admin:
    description: Allows managing PinnacleStats.
    default: op
